<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mod Runner — Jeu</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/skills.css">
    <link rel="stylesheet" href="CSS/achievements.css">
    <link rel="stylesheet" href="CSS/shop.css">
    <link rel="stylesheet" href="CSS/controls.css">
    <link rel="stylesheet" href="CSS/stats.css">
</head>
<body>
    <div id="game-wrapper">
        <nav class="game-nav" aria-label="Navigation">
            <a href="index.html">← Accueil</a>
        </nav>
        <!-- Title -->
        

        <!-- Game container with canvas and overlays -->
        <div id="game-container">
            <canvas id="gameCanvas" width="1024" height="640"></canvas>

            <!-- HUD overlay showing score and lives -->
            <div id="hud">
                <div id="hud-left">
                    <span class="hud-label">SCORE</span>
                    <span id="scoreDisplay" class="hud-value">0</span>
                </div>
                <div id="hud-center">
                    <span class="hud-label">LEVEL</span>
                    <span id="levelDisplay" class="hud-value">1</span>
                </div>
                <div id="hud-right">
                    <span class="hud-label">LIVES</span>
                    <span id="livesDisplay" class="hud-value">3</span>
                </div>
            </div>
            <div id="top-left-controls">
                <button id="statsBtn" class="game-control-btn">Stats</button>
            </div>
            <div id="top-controls">
                <button id="pauseBtn" class="game-control-btn">Pause</button>
                <button id="resumeBtn" class="game-control-btn hidden">Reprendre</button>
            </div>

            <!-- Start screen overlay -->
            <div id="overlay" class="overlay-visible">
                <div id="overlay-content">
                    <h2 id="overlayTitle">Sky Runner</h2>
                    <p id="overlayMessage">Collect coins, stomp enemies, survive!</p>
                    <button id="startBtn">Demarrer</button>
                    <button id="levelSelectBtn" class="secondary-btn">Selection Niveau</button>
                    <button id="resetProgressBtn" class="secondary-btn">Reset Progression</button>
                    <button id="skillsBtn" class="secondary-btn">Compétences</button>
                    <button id="achievementsBtn" class="secondary-btn">Accomplissements</button>
                    <button id="shopBtn" class="secondary-btn">Magasin</button>
                    <button id="controlsBtn" class="secondary-btn">Contrôles</button>
                    <div id="options-panel">
                        <label>Personnage
                            <div id="characterSelect">
                                <button class="character-btn active" data-character="runner">Runner</button>
                                <button class="character-btn" data-character="ninja">Ninja</button>
                                <button class="character-btn" data-character="robot">Robot</button>
                                <button class="character-btn" data-character="mage">Mage</button>
                            </div>
                        </label>
                        <label>Mode libre <input type="checkbox" id="freeModeToggle"></label>
                        <label>Difficulte
                            <select id="difficultySelect">
                                <option value="easy">Facile</option>
                                <option value="normal" selected>Normal</option>
                                <option value="hard">Difficile</option>
                            </select>
                        </label>
                        <div id="volumeRow">
                            <button id="muteBtn" class="volume-icon-btn" title="Muet">&#128266;</button>
                            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50">
                            <span id="volumeLabel" class="volume-label">50%</span>
                        </div>
                    </div>
                    <div id="level-grid" class="hidden"></div>

                    <!-- Panneau de configuration des contrôles -->
                    <div id="controls-ui" class="hidden">
                        <h3>Configuration des Touches</h3>
                        <div class="rebind-grid">
                            <div class="rebind-item"><span>Gauche</span><button id="rebind-left">...</button></div>
                            <div class="rebind-item"><span>Droite</span><button id="rebind-right">...</button></div>
                            <div class="rebind-item"><span>Saut</span><button id="rebind-jump">...</button></div>
                            <div class="rebind-item"><span>Dash</span><button id="rebind-dash">...</button></div>
                        </div>
                        <button id="closeControlsBtn" class="secondary-btn">Retour</button>
                    </div>

                    <p id="controls-hint">
                        Fleches pour bouger • Haut/Espace sauter • Shift dash • P pause<br>
                        Double saut, checkpoint, power-up, pieges et ennemis varies
                    </p>
                </div>
            </div>

            <!-- Touch controls (mobile/Android) -->
            <div id="touch-controls">
                <div class="touch-left">
                    <button class="touch-btn" id="touchLeft">&#9664;</button>
                    <button class="touch-btn" id="touchRight">&#9654;</button>
                </div>
                <div class="touch-right">
                    <button class="touch-btn touch-btn-jump" id="touchJump">&#9650;</button>
                    <button class="touch-btn" id="touchDash">&#9889;</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto" src="song/Orbia song 2.mp3"></audio>

    <script src="JS/controls.js"></script>
    <script src="JS/skills.js"></script>
    <script src="JS/skills_ui.js"></script>
    <script src="JS/achievements.js"></script>
    <script src="JS/achievements_ui.js"></script>
    <script src="JS/shop.js"></script>
    <script src="JS/shop_ui.js"></script>
    <script src="JS/voice_narration.js"></script>
    <script src="JS/game.js"></script>
</body>
</html>
