<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Platformer Game</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div id="game-wrapper">
        <!-- Title -->
        <h1 id="game-title">Mod Runner</h1>

        <!-- Game container with canvas and overlays -->
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="480"></canvas>

            <!-- HUD overlay showing score and lives -->
            <div id="hud">
                <div id="hud-left">
                    <span class="hud-label">SCORE</span>
                    <span id="scoreDisplay" class="hud-value">0</span>
                </div>
                <div id="hud-center">
                    <span class="hud-label">LEVEL</span>
                    <span id="levelDisplay" class="hud-value">1</span>
                </div>
                <div id="hud-right">
                    <span class="hud-label">LIVES</span>
                    <span id="livesDisplay" class="hud-value">3</span>
                </div>
            </div>

            <!-- Start screen overlay -->
            <div id="overlay" class="overlay-visible">
                <div id="overlay-content">
                    <h2 id="overlayTitle">Sky Runner</h2>
                    <p id="overlayMessage">Collect coins, stomp enemies, survive!</p>
                    <button id="startBtn">Start Game</button>
                    <p id="controls-hint">
                        Arrow keys to move &bull; Up / Space to jump<br>
                        Stomp enemies from above to defeat them
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="JS/game.js"></script>
</body>
</html>
